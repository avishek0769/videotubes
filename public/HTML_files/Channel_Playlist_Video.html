<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../src/output.css">
</head>

<body>
    <!-- Remove Playlist Video Confirmation -->
    <div id="removeP_Video" data-videoid="" class="hidden absolute z-50 w-screen h-screen justify-center items-center bg-[#0000008b]">
        <div class="w-[18rem] sm:w-auto bg-black border border-[#ae7aff] px-6 py-5 z-50 rounded-lg">
            <div class="text-white font-medium text-lg pb-5">Are you sure you want to remove this video ?</div>
            <div class="space-x-6">
                <button id="yesRemove" class="rounded-full px-5 py-1 bg-red-500 hover:bg-red-400 font-semibold">Yes</button>
                <button id="noRemove" class="rounded-full bg-[#ffffff9a] hover:bg-[#ffffffab] px-5 py-1">No</button>
            </div>
        </div>
    </div>

    <div class="h-screen overflow-y-auto bg-[#121212] text-white" data-layout-wrapper>
        <div class="flex min-h-[calc(100vh-66px)] sm:min-h-[calc(100vh-82px)]" data-layout-content>
            <section class="w-full pb-[70px] sm:ml-[70px] sm:pb-0 lg:ml-0">
                <div class="flex flex-wrap gap-x-4 gap-y-10 p-4 xl:flex-nowrap">
                    <div class="w-full shrink-0 sm:max-w-md xl:max-w-sm">
                        <div class="relative mb-2 w-full pt-[56%]">
                            <div class="absolute inset-0"><img id="playlistCover" alt="React Mastery" class="h-full w-full" />
                                <div class="absolute inset-x-0 bottom-0">
                                    <div class="relative border-t bg-white/30 p-4 text-white backdrop-blur-sm before:absolute before:inset-0 before:bg-black/40">
                                        <div class="relative z-[1]">
                                            <p class="flex justify-between"><span class="inline-block">Playlist</span>
                                                <span id="videosLen" class="inline-block"></span>
                                            </p>
                                            <p id="p_CreatedAt" class="text-sm text-gray-200"> </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <h6 id="playlistName" class="mb-1 font-semibold"> </h6>
                        <p id="playlistDesc" class="flex text-sm text-gray-200"> </p>
                        <div class="mt-6 flex items-center gap-x-3">
                            <div class="h-16 w-16 shrink-0"><img id="ownerAvatar" alt="React Patterns" class="h-full w-full rounded-full" /></div>
                            <div class="w-full">
                                <h6 id="channelName" class="font-semibold"> </h6>
                                <p id="noOfSubs" class="text-sm text-gray-300">757K Subscribers</p>
                            </div>
                        </div>
                    </div>
                    <div id="playlist_Videos" class="flex w-full flex-col gap-y-4"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { initLayout } from '../Javascript/layout.js';
        initLayout(null);
    </script>
    <script type="module" src="../Javascript/Channel_Playlist_Video.js"></script>
</body>

</html>
