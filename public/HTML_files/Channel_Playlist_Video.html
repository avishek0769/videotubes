<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoTubes - Playlist</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../src/output.css">
</head>

<body class="custom-scrollbar">
    <!-- Remove Playlist Video Confirmation -->
    <div id="removeP_Video" data-videoid="" class="hidden fixed inset-0 z-[60] justify-center items-center bg-black/60 backdrop-blur-sm">
        <div class="modal-card animate-scale-in">
            <div class="text-white font-medium text-lg pb-5">Are you sure you want to remove this video?</div>
            <div class="flex gap-3">
                <button id="yesRemove" class="btn-danger">Yes, Remove</button>
                <button id="noRemove" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <div class="h-screen overflow-y-auto bg-[#0f0f0f] text-white custom-scrollbar" data-layout-wrapper>
        <div class="flex min-h-[calc(100vh-66px)] sm:min-h-[calc(100vh-82px)]" data-layout-content>
            <section class="w-full pb-[5rem] sm:ml-[70px] sm:pb-0 lg:ml-0">
                <div class="flex flex-wrap gap-x-6 gap-y-8 p-4 sm:p-6 xl:flex-nowrap">
                    <!-- Playlist Info Card -->
                    <div class="w-full shrink-0 sm:max-w-md xl:max-w-sm">
                        <div class="relative mb-3 w-full pt-[56%] rounded-2xl overflow-hidden">
                            <div class="absolute inset-0">
                                <img id="playlistCover" alt="Playlist Cover" class="h-full w-full" />
                                <div class="absolute inset-x-0 bottom-0">
                                    <div class="relative border-t border-white/10 bg-white/10 p-4 text-white backdrop-blur-md">
                                        <div class="relative z-[1]">
                                            <p class="flex justify-between text-sm font-medium">
                                                <span>Playlist</span>
                                                <span id="videosLen" class="text-[#ae7aff]"></span>
                                            </p>
                                            <p id="p_CreatedAt" class="text-xs text-gray-300 mt-0.5"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <h6 id="playlistName" class="mb-1 font-bold text-lg"></h6>
                        <p id="playlistDesc" class="text-sm text-gray-400 leading-relaxed"></p>
                        <div class="mt-5 flex items-center gap-x-3">
                            <div class="h-12 w-12 shrink-0">
                                <img id="ownerAvatar" alt="Channel" class="h-full w-full rounded-full ring-2 ring-white/10" />
                            </div>
                            <div class="w-full">
                                <h6 id="channelName" class="font-semibold text-sm"></h6>
                                <p id="noOfSubs" class="text-xs text-gray-400"></p>
                            </div>
                        </div>
                    </div>
                    <!-- Playlist Videos -->
                    <div id="playlist_Videos" class="flex w-full flex-col gap-y-3"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { initLayout } from '../Javascript/layout.js';
        initLayout(null);
    </script>
    <script type="module" src="../Javascript/Channel_Playlist_Video.js"></script>
</body>

</html>
