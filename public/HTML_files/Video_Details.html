<!DOCTYPE html>
<html class="overflow-hidden" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://vjs.zencdn.net/8.12.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../src/output.css">
</head>

<body>
    <!-- Delete Comment Confirmation -->
    <div id="deleteCommentDiv" data-commentid="" class="hidden absolute z-50 w-screen h-screen justify-center items-center bg-[#0000008b]">
        <div class="w-[18rem] sm:w-auto bg-black border border-[#ae7aff] px-6 py-5 z-50 rounded-lg">
            <div class="text-white font-medium text-lg pb-5">Are you sure you want to delete this comment ?</div>
            <div class="space-x-6">
                <button id="yesDeleteComm" class="rounded-full px-5 py-1 bg-red-500 hover:bg-red-400 font-semibold">Yes</button>
                <button id="noDeleteComm" class="rounded-full bg-[#ffffff9a] hover:bg-[#ffffffab] px-5 py-1">No</button>
            </div>
        </div>
    </div>

    <div class="h-screen overflow-y-auto bg-[#121212] text-white" data-layout-wrapper>
        <div class="flex min-h-[calc(100vh-66px)] sm:min-h-[calc(100vh-82px)]" data-layout-content>
            <section class="w-full pb-[70px] sm:ml-[70px] sm:pb-0">
                <div class="flex w-full flex-wrap gap-4 p-4 lg:flex-nowrap">
                    <div id="datasetDiv" class="col-span-12 w-full">
                        <div class="relative mb-4 w-full pt-[56%]">
                            <div id="gearBtn" class="flex transition duration-150 absolute z-[49] top-2 right-2 w-8 h-8 justify-center items-center rounded-full bg-[#00000051]">
                                <span class="text-[1.3rem] cursor-pointer material-symbols-outlined">settings</span>
                            </div>
                            <div id="resolutionDiv" class="hidden overflow-hidden rounded-md absolute top-12 right-3 z-[49] bg-black font-bold">
                                <div id="1080p" class="flex gap-2 items-center px-2 py-[0.3rem] cursor-pointer hover:bg-[#ffffff3c]">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" fill="#ae7aff" class="opacity-0 resolutionDots bi bi-circle-fill" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                    <div class="px-1">1080p</div>
                                </div>
                                <div id="720p" class="flex gap-2 items-center px-2 py-[0.3rem] cursor-pointer hover:bg-[#ffffff3c]">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" fill="#ae7aff" class="opacity-0 resolutionDots bi bi-circle-fill" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                    <div class="px-1">720p</div>
                                </div>
                                <div id="480p" class="flex gap-2 items-center px-2 py-[0.3rem] cursor-pointer hover:bg-[#ffffff3c]">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="11" fill="#ae7aff" class="resolutionDots bi bi-circle-fill" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                    <div class="px-1">480p</div>
                                </div>
                            </div>
                            <div id="video_showCase" class="absolute inset-0"></div>
                        </div>
                        <div class="group mb-4 w-full rounded-lg border p-4 duration-200 hover:bg-white/5 focus:bg-white/5" role="button" tabindex="0">
                            <div class="flex flex-wrap gap-y-2">
                                <div class="w-full md:w-1/2 lg:w-full xl:w-1/2">
                                    <h1 id="title" class="text-lg font-bold"></h1>
                                    <p id="views-date" class="flex text-sm text-gray-200"></p>
                                </div>
                                <div class="w-full md:w-1/2 lg:w-full xl:w-1/2">
                                    <div class="flex items-center justify-between gap-x-4 md:justify-end lg:justify-between xl:justify-end">
                                        <div class="flex overflow-hidden rounded-lg border">
                                            <button id="likeBtn" data-liked="false" class="group/btn flex items-center gap-x-2 border-r border-gray-700 px-4 py-1.5 hover:bg-white/10">
                                                <span class="inline-block w-5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.633 10.5c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 012.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 00.322-1.672V3a.75.75 0 01.75-.75A2.25 2.25 0 0116.5 4.5c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 01-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 00-1.423-.23H5.904M14.25 9h2.25M5.904 18.75c.083.205.173.405.27.602.197.4-.078.898-.523.898h-.908c-.889 0-1.713-.518-1.972-1.368a12 12 0 01-.521-3.507c0-1.553.295-3.036.831-4.398C3.387 10.203 4.167 9.75 5 9.75h1.053c.472 0 .745.556.5.96a8.958 8.958 0 00-1.302 4.665c0 1.194.232 2.333.654 3.375z"></path>
                                                    </svg>
                                                </span>
                                                <span id="likes"> </span>
                                            </button>
                                            <button class="group/btn flex items-center gap-x-2 px-4 py-1.5 hover:bg-white/10">
                                                <span class="inline-block w-5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 15h2.25m8.024-9.75c.011.05.028.1.052.148.591 1.2.924 2.55.924 3.977a8.96 8.96 0 01-.999 4.125m.023-8.25c-.076-.365.183-.75.575-.75h.908c.889 0 1.713.518 1.972 1.368.339 1.11.521 2.287.521 3.507 0 1.553-.295 3.036-.831 4.398C20.613 14.547 19.833 15 19 15h-1.053c-.472 0-.745-.556-.5-.96a8.95 8.95 0 00.303-.54m.023-8.25H16.48a4.5 4.5 0 01-1.423-.23l-3.114-1.04a4.5 4.5 0 00-1.423-.23H6.504c-.618 0-1.217.247-1.605.729A11.95 11.95 0 002.25 12c0 .434.023.863.068 1.285C2.427 14.306 3.346 15 4.372 15h3.126c.618 0 .991.724.725 1.282A7.471 7.471 0 007.5 19.5a2.25 2.25 0 002.25 2.25.75.75 0 00.75-.75v-.633c0-.573.11-1.14.322-1.672.304-.76.93-1.33 1.653-1.715a9.04 9.04 0 002.86-2.4c.498-.634 1.226-1.08 2.032-1.08h.384"></path>
                                                    </svg>
                                                </span>
                                                <span id="disLikes"> 34 </span>
                                            </button>
                                        </div>
                                        <div class="relative block">
                                            <button id="saveBtn" class="peer flex items-center gap-x-2 rounded-lg bg-white px-4 py-1.5 text-black">
                                                <span class="inline-block w-5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m3-3H9m4.06-7.19l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"></path>
                                                    </svg>
                                                </span>
                                                Save
                                            </button>
                                            <div id="playlistDropDown" class="absolute right-0 top-full z-10 w-64 overflow-hidden rounded-lg bg-[#121212] p-4 shadow shadow-slate-50/30 hidden">
                                                <h3 class="mb-4 text-center text-lg font-semibold">Save to playlist</h3>
                                                <div class="mb-4">
                                                    <h4 id="plNotAvlabl"></h4>
                                                    <ul id="playlistNameSection" class="max-h-[8rem] overflow-auto custom-scrollbar"></ul>
                                                </div>
                                                <div class="flex flex-col">
                                                    <label for="playlist-name" class="mb-1 inline-block cursor-pointer">Name</label>
                                                    <input class="w-full rounded-lg border border-transparent bg-white px-3 py-2 text-black outline-none focus:border-[#ae7aff]" id="playlist_name" placeholder="Enter playlist name" />
                                                    <div class="flex mt-2">
                                                        <label for="isPrivate">Private</label>
                                                        <input type="checkbox" name="isPrivate" id="isPrivate" class="ml-5">
                                                    </div>
                                                    <button id="savePlaylist" class="mx-auto mt-4 rounded-lg bg-[#ae7aff] px-4 py-2 text-black">Create new playlist</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 flex items-center justify-between">
                                <div id="channelDiv" data-channelid="" class="flex items-center gap-x-4">
                                    <div class="mt-2 h-12 w-12 shrink-0"><img id="channelAvatar" src="" alt="" class="h-full w-full rounded-full" /></div>
                                    <div class="block">
                                        <p id="channelName" class="text-gray-200"></p>
                                        <p id="noOfSubs" class="text-sm text-gray-400"></p>
                                    </div>
                                </div>
                                <div class="block">
                                    <button id="subscribeBtn" data-subscribed="false" class="group/btn mr-1 flex w-full items-center gap-x-2 bg-[#ae7aff] px-3 py-2 text-center font-bold text-black shadow-[5px_5px_0px_0px_#4f4e4e] transition-all duration-150 ease-in-out active:translate-x-[5px] active:translate-y-[5px] active:shadow-[0px_0px_0px_0px_#4f4e4e] sm:w-auto"></button>
                                </div>
                            </div>
                            <hr class="my-4 border-white" />
                            <div class="h-5 overflow-hidden group-focus:h-auto">
                                <p id="descriptionSection" class="text-sm"></p>
                                <span class="text-sm font-semibold">Tags:</span>
                                <p id="tagsSection" class="text-sm font-medium"></p>
                            </div>
                        </div>
                        <button class="peer w-full rounded-lg border p-4 text-left duration-200 hover:bg-white/5 focus:bg-white/5 sm:hidden">
                            <h6 id="noOfCommentsMob" class="font-semibold"></h6>
                        </button>
                        <div class="fixed inset-x-0 top-full z-[60] h-[calc(100%-69px)] overflow-auto rounded-lg border bg-[#121212] p-4 duration-200 hover:top-[67px] peer-focus:top-[67px] sm:static sm:h-auto sm:max-h-[500px] lg:max-h-none">
                            <div class="block">
                                <h6 id="noOfComments" class="mb-4 font-semibold"> </h6>
                                <div class="relative flex items-center">
                                    <input id="commentInput" type="text" class="w-full rounded-lg border bg-transparent px-4 py-2 placeholder-white text-white" placeholder="Add a Comment" />
                                    <span id="sendButton" class="material-symbols-outlined absolute right-2 cursor-pointer transition-transform transform duration-150">send</span>
                                </div>
                            </div>
                            <hr class="my-4 border-white" />
                            <div id="commentSection"></div>
                            <div id="bufferingDiv1" class="hidden flex-col gap-3 items-center mt-2 justify-center">
                                <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 50px; height: 50px;" loop autoplay></dotlottie-player>
                            </div>
                            <div id="loadMore" class="flex justify-center mt-5 cursor-pointer text-[#ae7aff] font-medium text-lg">Load more</div>
                        </div>
                    </div>
                    <div id="suggestion" class="col-span-12 flex w-full shrink-0 flex-col gap-3 lg:w-[350px] xl:w-[400px]"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.11.4/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-resolution-switcher@0.6.1/videojs-resolution-switcher.min.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { initLayout } from '../Javascript/layout.js';
        initLayout(null, { expandedSidebar: false });
    </script>
    <script type="module" src="../Javascript/_video_Details.js"></script>
</body>

</html>
