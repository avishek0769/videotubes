<!DOCTYPE html>
<html class="overflow-hidden" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoTubes - Watch</title>
    <link href="https://vjs.zencdn.net/8.12.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../src/output.css">
</head>

<body class="custom-scrollbar">
    <!-- Delete Comment Confirmation -->
    <div id="deleteCommentDiv" data-commentid="" class="hidden fixed inset-0 z-[60] justify-center items-center bg-black/60 backdrop-blur-sm">
        <div class="modal-card animate-scale-in">
            <div class="text-white font-medium text-lg pb-5">Are you sure you want to delete this comment?</div>
            <div class="flex gap-3">
                <button id="yesDeleteComm" class="btn-danger">Yes, Delete</button>
                <button id="noDeleteComm" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <div class="h-screen overflow-y-auto bg-[#0f0f0f] text-white custom-scrollbar" data-layout-wrapper>
        <div class="flex min-h-[calc(100vh-66px)] sm:min-h-[calc(100vh-82px)]" data-layout-content>
            <section class="w-full pb-[70px] sm:ml-[70px] sm:pb-0">
                <div class="flex w-full flex-wrap gap-4 p-4 lg:flex-nowrap lg:p-6">
                    <div id="datasetDiv" class="col-span-12 w-full">
                        <!-- Video Player Area -->
                        <div class="relative mb-4 w-full pt-[56%] rounded-2xl overflow-hidden bg-black">
                            <div id="gearBtn" class="flex transition-all duration-200 absolute z-[49] top-3 right-3 w-9 h-9 justify-center items-center rounded-full bg-black/40 backdrop-blur-sm hover:bg-black/60 cursor-pointer">
                                <span class="text-[1.3rem] material-symbols-outlined">settings</span>
                            </div>
                            <div id="resolutionDiv" class="hidden overflow-hidden rounded-xl absolute top-14 right-3 z-[49] bg-[#1a1a2e]/95 backdrop-blur-md font-semibold text-sm border border-white/10 shadow-2xl">
                                <div id="1080p" class="flex gap-2 items-center px-3 py-2 cursor-pointer hover:bg-white/[0.08] transition-colors duration-150">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="#ae7aff" class="opacity-0 resolutionDots" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                    <div>1080p</div>
                                </div>
                                <div id="720p" class="flex gap-2 items-center px-3 py-2 cursor-pointer hover:bg-white/[0.08] transition-colors duration-150">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="#ae7aff" class="opacity-0 resolutionDots" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                    <div>720p</div>
                                </div>
                                <div id="480p" class="flex gap-2 items-center px-3 py-2 cursor-pointer hover:bg-white/[0.08] transition-colors duration-150">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="#ae7aff" class="resolutionDots" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                                    <div>480p</div>
                                </div>
                            </div>
                            <div id="video_showCase" class="absolute inset-0"></div>
                        </div>

                        <!-- Video Info Card -->
                        <div class="group mb-4 w-full rounded-2xl glass-card p-4 sm:p-5 transition-all duration-300" role="button" tabindex="0">
                            <div class="flex flex-wrap gap-y-3">
                                <div class="w-full md:w-1/2 lg:w-full xl:w-1/2">
                                    <h1 id="title" class="text-lg font-bold leading-snug"></h1>
                                    <p id="views-date" class="flex text-sm text-gray-400 mt-1"></p>
                                </div>
                                <div class="w-full md:w-1/2 lg:w-full xl:w-1/2">
                                    <div class="flex items-center justify-between gap-x-4 md:justify-end lg:justify-between xl:justify-end">
                                        <!-- Like/Dislike -->
                                        <div class="flex overflow-hidden rounded-full border border-white/10 bg-white/[0.04]">
                                            <button id="likeBtn" data-liked="false" class="group/btn flex items-center gap-x-2 border-r border-white/10 px-4 py-2 transition-colors duration-200 hover:bg-white/[0.08]">
                                                <span class="inline-block w-5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.633 10.5c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 012.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 00.322-1.672V3a.75.75 0 01.75-.75A2.25 2.25 0 0116.5 4.5c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 01-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 00-1.423-.23H5.904M14.25 9h2.25M5.904 18.75c.083.205.173.405.27.602.197.4-.078.898-.523.898h-.908c-.889 0-1.713-.518-1.972-1.368a12 12 0 01-.521-3.507c0-1.553.295-3.036.831-4.398C3.387 10.203 4.167 9.75 5 9.75h1.053c.472 0 .745.556.5.96a8.958 8.958 0 00-1.302 4.665c0 1.194.232 2.333.654 3.375z"></path>
                                                    </svg>
                                                </span>
                                                <span id="likes" class="text-sm font-medium"> </span>
                                            </button>
                                            <button class="group/btn flex items-center gap-x-2 px-4 py-2 transition-colors duration-200 hover:bg-white/[0.08]">
                                                <span class="inline-block w-5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 15h2.25m8.024-9.75c.011.05.028.1.052.148.591 1.2.924 2.55.924 3.977a8.96 8.96 0 01-.999 4.125m.023-8.25c-.076-.365.183-.75.575-.75h.908c.889 0 1.713.518 1.972 1.368.339 1.11.521 2.287.521 3.507 0 1.553-.295 3.036-.831 4.398C20.613 14.547 19.833 15 19 15h-1.053c-.472 0-.745-.556-.5-.96a8.95 8.95 0 00.303-.54m.023-8.25H16.48a4.5 4.5 0 01-1.423-.23l-3.114-1.04a4.5 4.5 0 00-1.423-.23H6.504c-.618 0-1.217.247-1.605.729A11.95 11.95 0 002.25 12c0 .434.023.863.068 1.285C2.427 14.306 3.346 15 4.372 15h3.126c.618 0 .991.724.725 1.282A7.471 7.471 0 007.5 19.5a2.25 2.25 0 002.25 2.25.75.75 0 00.75-.75v-.633c0-.573.11-1.14.322-1.672.304-.76.93-1.33 1.653-1.715a9.04 9.04 0 002.86-2.4c.498-.634 1.226-1.08 2.032-1.08h.384"></path>
                                                    </svg>
                                                </span>
                                                <span id="disLikes" class="text-sm font-medium"> </span>
                                            </button>
                                        </div>
                                        <!-- Save Button -->
                                        <div class="relative block">
                                            <button id="saveBtn" class="peer flex items-center gap-x-2 rounded-full bg-white/[0.08] px-4 py-2 text-sm font-medium transition-all duration-200 hover:bg-white/[0.15]">
                                                <span class="inline-block w-5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m3-3H9m4.06-7.19l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"></path>
                                                    </svg>
                                                </span>
                                                Save
                                            </button>
                                            <div id="playlistDropDown" class="absolute right-0 top-full z-10 mt-2 w-64 overflow-hidden rounded-2xl bg-[#1a1a2e]/95 backdrop-blur-md p-4 border border-white/10 shadow-2xl shadow-black/40 hidden animate-scale-in">
                                                <h3 class="mb-4 text-center text-base font-semibold">Save to playlist</h3>
                                                <div class="mb-4">
                                                    <h4 id="plNotAvlabl" class="text-sm text-gray-400"></h4>
                                                    <ul id="playlistNameSection" class="max-h-[8rem] overflow-auto custom-scrollbar"></ul>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label for="playlist-name" class="text-sm text-gray-300 cursor-pointer">Name</label>
                                                    <input class="input-field text-sm" id="playlist_name" placeholder="Enter playlist name" />
                                                    <div class="flex items-center gap-3 mt-1">
                                                        <input type="checkbox" name="isPrivate" id="isPrivate" class="h-4 w-4 rounded accent-[#ae7aff]">
                                                        <label for="isPrivate" class="text-sm text-gray-300">Private</label>
                                                    </div>
                                                    <button id="savePlaylist" class="mt-2 rounded-lg bg-gradient-to-r from-[#ae7aff] to-[#8b5cf6] px-4 py-2 text-sm font-semibold text-black transition-all duration-200 hover:shadow-[0_0_15px_rgba(174,122,255,0.3)]">Create new playlist</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Channel Info -->
                            <div class="mt-4 flex items-center justify-between">
                                <div id="channelDiv" data-channelid="" class="flex items-center gap-x-3 cursor-pointer">
                                    <div class="h-11 w-11 shrink-0"><img id="channelAvatar" src="" alt="" class="h-full w-full rounded-full ring-2 ring-white/10" /></div>
                                    <div class="block">
                                        <p id="channelName" class="font-medium text-sm"></p>
                                        <p id="noOfSubs" class="text-xs text-gray-400"></p>
                                    </div>
                                </div>
                                <div class="block">
                                    <button id="subscribeBtn" data-subscribed="false" class="btn-subscribe text-sm"></button>
                                </div>
                            </div>
                            <hr class="my-4 border-white/[0.08]" />
                            <!-- Description -->
                            <div class="h-5 overflow-hidden group-focus:h-auto transition-all duration-300">
                                <p id="descriptionSection" class="text-sm text-gray-300 leading-relaxed"></p>
                                <div class="mt-2 flex flex-wrap gap-2">
                                    <span class="text-xs font-semibold text-gray-400">Tags:</span>
                                    <p id="tagsSection" class="text-xs"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Comments Section -->
                        <button class="peer w-full rounded-2xl glass-card p-4 text-left transition-all duration-300 hover:bg-white/[0.06] sm:hidden">
                            <h6 id="noOfCommentsMob" class="font-semibold text-sm"></h6>
                        </button>
                        <div class="fixed inset-x-0 top-full z-[60] h-[calc(100%-69px)] overflow-auto rounded-t-2xl glass-card p-4 duration-300 hover:top-[67px] peer-focus:top-[67px] sm:static sm:h-auto sm:max-h-[500px] sm:rounded-2xl lg:max-h-none custom-scrollbar">
                            <div class="block">
                                <h6 id="noOfComments" class="mb-4 font-semibold text-sm"> </h6>
                                <div class="relative flex items-center">
                                    <input id="commentInput" type="text" class="input-field pr-10 text-sm" placeholder="Add a comment..." />
                                    <span id="sendButton" class="material-symbols-outlined absolute right-3 cursor-pointer text-[#ae7aff] transition-transform duration-200 hover:scale-110 active:scale-90">send</span>
                                </div>
                            </div>
                            <hr class="my-4 border-white/[0.08]" />
                            <div id="commentSection"></div>
                            <div id="bufferingDiv1" class="hidden flex-col gap-3 items-center mt-2 justify-center">
                                <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 40px; height: 40px;" loop autoplay></dotlottie-player>
                            </div>
                            <div id="loadMore" class="flex justify-center mt-4 cursor-pointer text-[#ae7aff] font-semibold text-sm hover:text-[#c4a0ff] transition-colors duration-200">Load more</div>
                        </div>
                    </div>
                    <!-- Suggestions -->
                    <div id="suggestion" class="col-span-12 flex w-full shrink-0 flex-col gap-3 lg:w-[350px] xl:w-[400px]"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.11.4/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-resolution-switcher@0.6.1/videojs-resolution-switcher.min.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { initLayout } from '../Javascript/layout.js';
        initLayout(null, { expandedSidebar: false });
    </script>
    <script type="module" src="../Javascript/_video_Details.js"></script>
</body>

</html>
