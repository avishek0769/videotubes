<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div class="h-screen overflow-y-auto bg-[#121212] text-white" data-layout-wrapper>
        <div class="flex min-h-[calc(100vh-66px)] sm:min-h-[calc(100vh-82px)]" data-layout-content>
            <section class="w-full pb-[70px] sm:ml-[70px] sm:pb-0 lg:ml-0">
                <div class="flex flex-col gap-y-4 py-4 px-5">
                    <div id="noOfVideosDiv" class="flex text-[1.15rem] sm:text-2xl font-bold text-white">
                        <div id="what">Subscribers : &nbsp;&nbsp;</div>
                        <span id="noOfSubs"> </span>
                    </div>
                    <div class="relative mb-2 rounded-lg bg-[black] border-2 border-[#ae7aff] py-2 pl-8 pr-3 text-black">
                        <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true" class="h-5 w-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
                            </svg>
                        </span>
                        <input id="searchSubs" class="text-white w-full bg-transparent outline-none" placeholder="Search" />
                    </div>
                    <div id="mainDiv"></div>
                    <div id="bufferingDiv" class="flex flex-col gap-3 items-center justify-center">
                        <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 50px; height: 50px;" loop autoplay></dotlottie-player>
                    </div>
                    <div id="loadMore" class="p-2 cursor-pointer text-[#ae7aff] m-auto font-medium text-lg">Load more</div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { initLayout } from '../Javascript/layout.js';
        initLayout('subscribers');
    </script>
    <script type="module" src="../Javascript/_subscribers.js"></script>
</body>

</html>
