<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoTubes - Subscribers</title>
    <link rel="stylesheet" href="../src/output.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="custom-scrollbar">
    <div class="h-screen overflow-y-auto bg-[#0f0f0f] text-white custom-scrollbar" data-layout-wrapper>
        <div class="flex min-h-[calc(100vh-66px)] sm:min-h-[calc(100vh-82px)]" data-layout-content>
            <section class="w-full pb-[5rem] sm:ml-[70px] sm:pb-0 lg:ml-0">
                <div class="flex flex-col gap-y-4 py-4 px-4 sm:px-6">
                    <div id="noOfVideosDiv" class="flex items-center gap-2 section-title">
                        <div id="what">Subscribers</div>
                        <span id="noOfSubs" class="text-[#ae7aff]"></span>
                    </div>
                    <!-- Search -->
                    <div class="relative rounded-xl bg-white/[0.04] border border-white/10 transition-all duration-300 focus-within:border-[#ae7aff]/40 focus-within:shadow-[0_0_0_3px_rgba(174,122,255,0.08)]">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
                            </svg>
                        </span>
                        <input id="searchSubs" class="w-full bg-transparent py-2.5 pl-10 pr-4 text-sm text-white outline-none placeholder-gray-500" placeholder="Search subscribers..." />
                    </div>
                    <!-- Subscribers List -->
                    <div id="mainDiv" class="space-y-2"></div>
                    <div id="bufferingDiv" class="flex flex-col gap-3 items-center justify-center py-4">
                        <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 40px; height: 40px;" loop autoplay></dotlottie-player>
                    </div>
                    <div id="loadMore" class="p-2 cursor-pointer text-[#ae7aff] m-auto font-semibold text-sm rounded-full px-6 bg-[#ae7aff]/10 border border-[#ae7aff]/20 transition-all duration-300 hover:bg-[#ae7aff]/20 hover:shadow-[0_0_15px_rgba(174,122,255,0.2)]">Load more</div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { initLayout } from '../Javascript/layout.js';
        initLayout('subscribers');
    </script>
    <script type="module" src="../Javascript/_subscribers.js"></script>
</body>

</html>
